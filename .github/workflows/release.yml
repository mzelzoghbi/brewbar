name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Project
        run: xcodegen generate

      - name: Build Release
        run: xcodebuild -project Brewbar.xcodeproj -scheme Brewbar -configuration Release build SYMROOT=build

      - name: Create DMG
        run: bash scripts/build_dmg.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: Brewbar.dmg
          generate_release_notes: true

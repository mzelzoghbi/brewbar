name: Build and Test
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Project
        run: xcodegen generate

      - name: Build
        run: xcodebuild -project Brewbar.xcodeproj -scheme Brewbar -configuration Debug build

      - name: Test
        run: xcodebuild -project Brewbar.xcodeproj -scheme Brewbar -configuration Debug test
